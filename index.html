<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kevin Winkel</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background-color: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .eyes-container {
      display: flex;
      gap: 30px;
    }

    .eye {
      width: 120px;
      height: 140px;
      background: #fff;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      position: relative;
      overflow: hidden;
      box-shadow: 
        0 0 40px rgba(255, 255, 255, 0.1),
        inset 0 0 30px rgba(0, 0, 0, 0.1);
    }

    .pupil {
      width: 50px;
      height: 50px;
      background: #1a1a2e;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: transform 0.05s ease-out;
    }

    .pupil::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 50%;
      top: 8px;
      right: 8px;
    }

    .eyelid {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: #1a1a2e;
      border-radius: 50% 50% 0 0;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="eyes-container">
    <div class="eye">
      <div class="eyelid"></div>
      <div class="pupil"></div>
    </div>
    <div class="eye">
      <div class="eyelid"></div>
      <div class="pupil"></div>
    </div>
  </div>

  <script>
    const pupils = document.querySelectorAll('.pupil');
    const eyeWidth = 120;
    const eyeHeight = 140;
    const pupilSize = 50;
    const maxOffsetX = (eyeWidth - pupilSize) / 2;
    const maxOffsetY = (eyeHeight - pupilSize) / 2;

    document.addEventListener('mousemove', (e) => {
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;
      
      const deltaX = e.clientX - centerX;
      const deltaY = e.clientY - centerY;
      
      const angle = Math.atan2(deltaY, deltaX);
      const distance = Math.min(
        Math.sqrt(deltaX * deltaX + deltaY * deltaY) / 300,
        1
      );
      
      const offsetX = Math.cos(angle) * maxOffsetX * distance;
      const offsetY = Math.sin(angle) * maxOffsetY * distance;

      pupils.forEach((pupil, index) => {
        const parallax = index === 0 ? 0.9 : 1.1;
        const adjustedX = offsetX * parallax;
        const adjustedY = offsetY * parallax;
        
        pupil.style.transform = `translate(calc(-50% + ${adjustedX}px), calc(-50% + ${adjustedY}px))`;
      });
    });
  </script>
</body>
</html>
